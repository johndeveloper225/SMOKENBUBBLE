<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="apple-touch-icon" href="/wallet-logo.png?v=2" />
    <title>Owner Access</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="top">
        <h1>Owner Access</h1>
        <p>Sign in with admin password to open the back office.</p>
      </header>

      <section class="card">
        <form id="ownerAccessForm" class="form">
          <label>
            Admin password
            <input
              id="ownerPassword"
              type="password"
              autocomplete="current-password"
              placeholder="Enter admin password"
              required
            />
          </label>
          <label class="small muted">
            <input id="showOwnerPassword" type="checkbox" />
            Show password
          </label>
          <button type="submit">Sign in</button>
        </form>
        <p id="ownerStatus" class="status-message"></p>
        <p class="small muted">
          Customer page: <a href="/join.html">/join.html</a>
        </p>
        <p>
          <button id="themeToggleBtn" type="button" class="btn-link secondary">
            Switch to Dark Theme
          </button>
        </p>
      </section>
    </main>

    <script src="/owner-auth.js"></script>
  </body>
</html>
