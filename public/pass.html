<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>Your Digital Pass</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container pass-page">
      <header class="top">
        <h1>Digital Pass</h1>
        <p>Wallet-style pass preview</p>
      </header>

      <section id="passCard" class="wallet-card">
        <div class="chip"></div>
        <p class="small-label">Member Name</p>
        <h2 id="passName">Loading...</h2>

        <p class="small-label">Membership ID</p>
        <p id="passMemberId" class="big-id"></p>

        <div class="qr-wrap">
          <img id="passQr" alt="Pass QR code" />
        </div>
      </section>

      <p id="statusMessage" class="status-message"></p>
      <a id="appleWalletBtn" href="#" class="btn-link hidden">Add to Apple Wallet</a>
      <a href="/" class="btn-link">Back to Home</a>
    </main>

    <script src="/pass.js"></script>
  </body>
</html>
