<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="apple-touch-icon" href="/wallet-logo.png?v=2" />
    <title>Store scan code — Smoke n Bubbles</title>
    <link rel="stylesheet" href="/styles.css?v=33" />
  </head>
  <body class="snb-page owner-qr-store">
    <main class="snb-wrap owner-qr-store-wrap">
      <article class="snb-card owner-qr-store-card" aria-label="Store join QR">
        <div class="snb-smoke" aria-hidden="true"></div>

        <header class="snb-brand">
          <div class="snb-logo-banner">
            <img
              class="snb-logo-image"
              src="/wallet-logo.png?v=3"
              alt="Smoke n Bubbles logo"
            />
          </div>
          <p class="snb-seal">VAPE <span class="snb-sep">|</span> BUBBLE TEA</p>
        </header>

        <div class="snb-rule" role="presentation"></div>

        <section class="snb-loyalty">
          <h2 class="snb-loyalty-title">Loyalty Rewards</h2>
          <p id="ownerRuleLine" class="snb-muted">Earn 1 point for every £3 spent</p>
          <p class="snb-reward">
            <span class="snb-star" aria-hidden="true">★</span>
            <span id="ownerRewardLine">Get £5 off when you reach 10 points</span>
          </p>
          <p class="snb-muted owner-qr-scan-copy">
            Scan this code to open checkout once. After checkout, customers must scan again.
          </p>
        </section>

        <div class="snb-qr-wrap owner-qr-join-wrap">
          <img id="joinQrImage" class="snb-qr" src="" alt="Store join QR code" width="280" height="280" />
        </div>

        <p id="qrLoadStatus" class="snb-muted owner-qr-load-status" aria-live="polite"></p>

        <p class="snb-scan-hint owner-qr-link-row">
          <a id="joinUrl" class="owner-qr-join-link" href="/join/start">Join link</a>
        </p>
      </article>

      <section class="snb-foot-card owner-qr-actions-panel">
        <a href="/admin-members.html" class="snb-wallet-btn owner-qr-action-primary">Customers back office</a>
        <button type="button" id="ownerQrSignOut" class="snb-wallet-btn owner-qr-action-secondary">
          Sign out
        </button>
      </section>
    </main>

    <script src="/owner-qr.js?v=33"></script>
  </body>
</html>
