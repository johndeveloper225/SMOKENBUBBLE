<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="apple-touch-icon" href="/wallet-logo.png?v=2" />
    <title>Admin Card QR View</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="top">
        <h1>Admin Card QR</h1>
        <p>Private owner view for checkout scan code.</p>
      </header>

      <section class="card">
        <form id="adminAccessForm" class="form">
          <label>
            Admin password
            <input
              id="adminPassword"
              type="password"
              autocomplete="current-password"
              placeholder="Enter admin password"
              required
            />
          </label>
          <button type="submit">Unlock QR view</button>
        </form>
        <p id="adminStatus" class="status-message"></p>
      </section>

      <section id="adminResult" class="card hidden">
        <p><strong>Name:</strong> <span id="adminName"></span></p>
        <p><strong>Phone:</strong> <span id="adminPhone"></span></p>
        <p><strong>Points:</strong> <span id="adminPoints"></span></p>
        <div class="qr-wrap">
          <img id="adminQr" alt="Member loyalty QR code" />
        </div>
      </section>

      <a href="/checkin-scanner.html" class="btn-link secondary">Back to scanner</a>
    </main>

    <script src="/admin-card.js"></script>
  </body>
</html>
