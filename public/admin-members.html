<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="apple-touch-icon" href="/wallet-logo.png?v=2" />
    <title>Customers Back Office</title>
    <link rel="stylesheet" href="/styles.css?v=27" />
  </head>
  <body>
    <button type="button" id="themeToggleBtn" class="owner-qr-theme-toggle">
      Theme
    </button>

    <main class="container snb-page-padded">
      <header class="top">
        <h1>Customers Back Office</h1>
        <p>
          Sign in from <a href="/owner.html">Owner</a> first, then open this page from the store scan
          code screen.
        </p>
      </header>

      <p id="membersStatus" class="status-message" aria-live="polite"></p>

      <section id="membersSection" class="card hidden">
        <h2>Customers</h2>
        <p>
          <button type="button" id="refreshMembersBtn">Refresh list</button>
          <button type="button" id="deleteSelectedBtn" class="btn-link secondary" style="margin-top: 0">
            Delete selected
          </button>
        </p>
        <div style="overflow-x: auto">
          <table id="membersTable" style="width: 100%; border-collapse: collapse">
            <thead>
              <tr>
                <th style="text-align: left; padding: 6px">
                  <input id="selectAllMembers" type="checkbox" aria-label="Select all customers" />
                </th>
                <th style="text-align: left; padding: 6px">Name</th>
                <th style="text-align: left; padding: 6px">Phone</th>
                <th style="text-align: left; padding: 6px">Points</th>
                <th style="text-align: left; padding: 6px">Action</th>
              </tr>
            </thead>
            <tbody id="membersTbody"></tbody>
          </table>
        </div>
      </section>

      <a href="/owner-qr.html" class="btn-link secondary">Store scan code</a>
      <a href="/owner.html" class="btn-link secondary">Back</a>
    </main>

    <script src="/admin-members.js?v=27"></script>
  </body>
</html>
