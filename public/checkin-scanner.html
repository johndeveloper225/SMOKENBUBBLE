<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="apple-touch-icon" href="/wallet-logo.png?v=2" />
    <title>Check-in Scanner</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="top">
        <h1>Check-in Scanner</h1>
        <p>Scan a member’s loyalty QR. One check-in per member per day.</p>
      </header>

      <section class="card">
        <form id="adminAccessForm" class="form">
          <label>
            Admin password
            <input
              id="adminPassword"
              type="password"
              autocomplete="current-password"
              placeholder="Enter admin password"
              required
            />
          </label>
          <label class="small muted">
            <input id="showPassword" type="checkbox" />
            Show password
          </label>
          <button type="submit">Sign in</button>
        </form>
        <div id="scannerSection" class="hidden">
          <p>
            <a class="btn-link secondary" href="/admin-members.html">Open customers page</a>
          </p>
          <div id="reader"></div>
          <p id="scanStatus" class="status-message">Camera not started.</p>
          <button type="button" id="startScanBtn">Start scanner</button>
        </div>
      </section>

      <section id="checkinResult" class="card hidden">
        <h2>Check-in result</h2>
        <p><strong>Name:</strong> <span id="rName"></span></p>
        <p><strong>Points:</strong> <span id="rPoints"></span></p>
        <p id="rMessage" class="muted"></p>
        <p>
          <a id="adminCardLink" class="btn-link secondary hidden" href="#"
            >Open private QR view</a
          >
        </p>
      </section>

      <a href="/" class="btn-link secondary">Back</a>
    </main>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="/checkin-scanner.js"></script>
  </body>
</html>
